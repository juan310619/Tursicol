<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TurisCol</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="prototipo_turismo/css/style.css">
    <style>
        main { flex: 1 0 auto; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 450px; padding: 2rem; }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="nav-wrapper container">
                <a href="index.html" class="brand-logo"><i class="material-icons">travel_explore</i>TurisCol</a>
                <ul class="right hide-on-med-and-down">
                    <li><a href="index.html">Destinos</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="login-card card animated fadeInDown" style="border-top: 5px solid #00897b;">
            <div class="center-align" style="margin-bottom: 2rem;">
                <i class="material-icons large teal-text">account_circle</i>
                <h4 class="teal-text text-darken-2" style="margin: 0; font-weight: 300;">Identificación</h4>
                <p class="grey-text">Ingresa tus credenciales seguras</p>
            </div>
            <form id="login-form">
                <div class="input-field">
                    <i class="material-icons prefix">email</i>
                    <input id="email" type="email" class="validate" required>
                    <label for="email">Correo Electrónico</label>
                </div>
                <div class="input-field">
                    <i class="material-icons prefix">lock</i>
                    <input id="password" type="password" class="validate" required>
                    <label for="password">Contraseña</label>
                </div>
                <button class="btn waves-effect waves-light w-100 teal darken-2" type="submit" style="width: 100%; margin-top: 1rem;">
                    Iniciar Sesión
                </button>
            </form>
            <p class="center-align" style="margin-top: 2rem;">
                ¿No tienes cuenta? <a href="registro.html" class="teal-text">Regístrate</a>
            </p>
        </div>
    </main>

    <footer class="page-footer teal darken-3">
        <div class="footer-copyright">
            <div class="container center-align">© 2026 TurisCol - Construcción Aplicación Web</div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
    try {
        if (typeof M !== 'undefined') { M.AutoInit(); M.updateTextFields(); }
    } catch(e){}
    document.querySelectorAll('.input-field input, .input-field textarea').forEach(function(el) {
        if (el.value) el.parentElement.querySelector('label')?.classList.add('active');
        el.addEventListener('focus', function(){ this.parentElement.querySelector('label')?.classList.add('active'); });
        el.addEventListener('blur', function(){ if(!this.value) this.parentElement.querySelector('label')?.classList.remove('active'); });
    });
    </script>
    <script src="prototipo_turismo/js/auth.js"></script>
    <script src="prototipo_turismo/js/ui.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await auth.fetch('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    auth.saveAuth(data.token, data.user);
                    M.toast({html: '¡Bienvenido!', classes: 'green'});
                    setTimeout(() => window.location.href = 'index.html', 1000);
                } else {
                    M.toast({html: data.message || 'Error al iniciar sesión', classes: 'red'});
                }
            } catch (err) { M.toast({html: 'Error de conexión', classes: 'red'}); }
        });
    </script>
</body>
</html>
